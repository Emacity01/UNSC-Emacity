<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UNSC • Emacity MUN</title>

<style>
body{
    margin:0;
    font-family:"Georgia",serif;
    color:white;
    text-align:center;
    overflow:hidden;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      linear-gradient(to bottom,rgba(0,0,0,0.75),rgba(0,0,0,0.95)),
      url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1950&q=80")
      no-repeat center/cover;
    z-index:-1;
}
.topLeft{
    position:absolute;
    top:15px; left:20px;
    background:rgba(0,0,0,0.7);
    padding:8px 15px;
    font-size:13px;
    letter-spacing:2px;
    box-shadow:0 0 12px #1a73e8;
}
.clock{
    position:absolute;
    top:15px; right:20px;
    font-size:13px;
    background:rgba(0,0,0,0.7);
    padding:8px 15px;
}
.intro{ margin-top:120px; font-size:30px; min-height:90px; }

button{
    margin-top:20px;
    padding:12px 24px;
    font-size:18px;
    background:#1a73e8;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#idScreen{
position:fixed;inset:0;background:black;
display:flex;flex-direction:column;
justify-content:center;align-items:center;z-index:9999
}
input{
 padding:12px;
 font-size:18px;
 margin-top:15px;
 text-align:center;
 text-transform:uppercase;
}
#error{margin-top:10px;display:none;font-weight:bold}
.highlight{color:#1a73e8;font-weight:bold}
.card{display:none;margin-top:40px;opacity:0;transition:1s}
</style>
</head>

<body>

<div id="idScreen">
<h2>United Nations Security Council</h2>
<p>Enter your Delegate ID</p>
<input id="idInput" placeholder="UNSC01" autocomplete="off">
<button onclick="verifyID()">Proceed</button>
<p id="error"></p>
</div>

<div class="topLeft">UNITED NATIONS SECURITY COUNCIL • EMACITY</div>
<div class="clock" id="clock"></div>

<div class="intro" id="intro"></div>

<div class="card" id="card">
<h1>DELEGATE RECOGNITION</h1>
<p>Name: <span class="highlight" id="delName"></span></p>
<p id="roleLine"></p>
<p>Committee: <span class="highlight">UNSC</span></p>
</div>

<script>
// CLOCK STARTS IMMEDIATELY
function updateClock(){
 document.getElementById('clock').innerText =
 new Date().toLocaleTimeString('en-IN',{timeZone:'Asia/Kolkata'});
}
setInterval(updateClock,1000);
updateClock();

// DELEGATE DATA
const delegates = {
"UNSC01": { name: "Arnav Vikrant Mane", country: "Greece" },
"UNSC02": { name: "Avneesh Ankush Gaurkar", country: "Liberia" },
"UNSC03": { name: "Kanishk Biswas", country: "United Kingdom" },
"UNSC04": { name: "Aryan Sharma", country: "Colombia" },
"UNSC05": { name: "Nishad Dhatrak", country: "Israel" },
"UNSC06": { name: "Pranav Kudva Nandavara", country: "France" },
"UNSC07": { name: "Aaral Jaiswal", country: "USA" },
"UNSC08": { name: "Shikhar Joshi", country: "Denmark" },
"UNSC09": { name: "Samen Aneja", country: "China" },
"UNSC10": { name: "Ishaan Nesarikar", country: "Yemen" },
"UNSC11": { name: "Mayan A. Sreedharan", country: "Russia" },
"UNSC12": { name: "Tanaya Choudhari", country: "India" },
"UNSC13": { name: "Sushant Kumar Sharma", country: "Somalia" },
"UNSC14": { name: "Affan Nazimuddin Shaikh", country: "African Union" },
"UNSC15": { name: "Ayan Patidar", country: "Egypt" },
"UNSC16": { name: "Akshay Kumar Mishra", country: "Germany" },
"UNSC17": { name: "Sujan Baratam", country: "Panama" },
"UNSC18": { name: "Parth Ambre", country: "Pakistan" },
"UNSC19": { name: "Parth Dasare", country: "Bahrain" },
"UNSC20": { name: "Arnav Papalkar", country: "Japan" },
"UNSC21": { name: "Anika Singh", country: "Iran" },
"UNSC22": { name: "Suhab Singh", country: "DR Congo" },
"UNSC23": { name: "Naina Sarawagi", country: "Italy" },
"UNSC24": { name: "Dhruv Sharma", country: "North Korea" },
"UNSC25": { name: "Samanvita Nayak", country: "South Korea" },
"UNSC26": { name: "Arnav kothari", country: "Norway" },
"UNSC27": { name: "Anurag Bansal", country: "Canada" },
"UNSC28": { name: "Yashashvi Dhar Dubey", country: "Australia" },	
    

"YASH01": { name: "Yash Borkar", position: "President" },
"ARJ02": { name: "Arjun Potnis", position: "Vice President" },
"PRA03": { name: "Pratyush Mahapatra", position: "Rapporteur" }
};

document.getElementById("idInput").addEventListener("keydown",e=>{
 if(e.key==="Enter") verifyID();
});

function verifyID(){
 const raw = document.getElementById("idInput").value;
 const id = raw.replace(/\s/g,'').toUpperCase(); // FIX
 const error=document.getElementById("error");

 if(delegates[id]){
   const d = delegates[id];
   error.style.display="block";
   error.style.color="#00ff88";
   error.innerText="Access Granted";

   setTimeout(()=>{
     document.getElementById("idScreen").style.display="none";
     document.getElementById("delName").innerText=d.name;

     if(d.position){
       roleLine.innerHTML='Position: <span class="highlight">'+d.position+'</span>';
     }else{
       roleLine.innerHTML='Country: <span class="highlight">'+d.country+'</span>';
     }

     const card=document.getElementById("card");
     card.style.display="block";
     setTimeout(()=>card.style.opacity=1,100);

   },800);

 }else{
   error.style.display="block";
   error.style.color="red";
   error.innerText="Invalid Delegate ID";
 }
}
</script>

</body>
</html>
